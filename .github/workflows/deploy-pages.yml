name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '部署原因（可选）'
        required: false
        default: '手动触发'
  push:
    branches: [main]

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ======================
      # 【关键】替换原生upload-pages-artifact，手动打包保留隐藏文件
      # ======================
      - name: Package site artifact (include dotfiles like .well-known)
        run: |
          # 把当前目录所有内容（包含 .开头目录）打包
          tar -cf site.tar .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: site.tar

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
